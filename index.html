<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spor Skor Tahmin Analizi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r bg-indigo-400 to-cyan-400">
                📊 Yapay Zeka & Poisson Skor Analiz Motoru
            </h1>
            <p class="text-gray-400 mt-2 text-sm md:text-base">Takım istatistiklerine göre optimize edilmiş olasılıksal skor tahmin raporu.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-900 p-5 rounded-xl border border-gray-800">
                <h3 class="text-lg font-bold text-indigo-400 mb-4">🏠 Ev Sahibi İstatistikleri</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">İç Saha Gol Atma Oranı (Maç Başı)</label>
                        <input type="number" id="homeAttack" value="1.8" step="0.1" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white font-mono">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">İç Saha Gol Yeme Oranı (Maç Başı)</label>
                        <input type="number" id="homeDefense" value="0.9" step="0.1" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white font-mono">
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-center">
                <button onclick="analizEt()" class="w-full md:w-auto px-8 py-4 bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 text-white font-bold rounded-xl shadow-lg shadow-indigo-900/30 transition transform hover:scale-105">
                    ⚙️ Analizi Başlat
                </button>
            </div>

            <div class="bg-gray-900 p-5 rounded-xl border border-gray-800">
                <h3 class="text-lg font-bold text-cyan-400 mb-4">🚀 Deplasman İstatistikleri</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Dış Saha Gol Atma Oranı (Maç Başı)</label>
                        <input type="number" id="awayAttack" value="1.4" step="0.1" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white font-mono">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">
