<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğitici Zar Oyunu</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #218838; }
        .result { font-size: 24px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Basit Olasılık Oyunu</h2>
    <p>Butona basarak 1 ile 6 arasında rastgele bir sayı üretin.</p>
    <button onclick="zarAt()">Zar At</button>
    <div class="result" id="sonuc">-</div>
</div>

<script>
function zarAt() {
    // Math.random() 0 ile 1 arasında rastgele bir ondalık sayı üretir.
    // Bunu 6 ile çarpıp yukarı yuvarlayarak 1-6 arası tam sayı elde ederiz.
    let rastgeleSayi = Math.floor(Math.random() * 6) + 1;
    
    let sonucMetni = "Gelen Zar: " + rastgeleSayi;
    
    if(rastgeleSayi === 6) {
        sonucMetni += " 🎉 (Tebrikler, en yüksek sayı!)";
    }
    
    document.getElementById("sonuc").innerText = sonucMetni;
}
</script>

</body>
</html>
