<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seni Çok Seviyorum Büşram ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:'Arial',sans-serif;
background:linear-gradient(135deg,#ff4d6d,#ff758f,#ffc2d1);
}
.card{
text-align:center;
padding:30px;
color:#fff;
z-index:2;
}
h1{
font-size:3rem;
margin-bottom:20px;
animation:kalp 1.2s infinite;
}
p{
font-size:1.4rem;
line-height:1.8;
max-width:700px;
}
.heart{
position:absolute;
top:-50px;
color:#fff;
animation:dus linear infinite;
}
@keyframes kalp{
0%,100%{transform:scale(1)}
50%{transform:scale(1.15)}
}
@keyframes dus{
0%{transform:translateY(-50px) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}
</style>
</head>
<body>

<div class="card">
<h1>❤️ Seni Çok Seviyorum Büşram ❤️</h1>
<p>
Sen benim en güzel hikâyem, en değerli mutluluğumsun.<br>
Her gülüşünde yeniden aşık oluyorum sana.<br>
İyi ki varsın, iyi ki hayatımdasın.<br><br>
💖 Sonsuza Kadar Seni Çok Seviyorum Büşram 💖
</p>
</div>

<script>
for(let i=0;i<100;i++){
let kalp=document.createElement("div");
kalp.className="heart";
kalp.innerHTML="❤";
kalp.style.left=Math.random()*100+"vw";
kalp.style.fontSize=(Math.random()*25+15)+"px";
kalp.style.opacity=Math.random();
kalp.style.animationDuration=(Math.random()*5+5)+"s";
document.body.appendChild(kalp);
}
</script>

</body>
</html>
