<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RichBonus</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
background:
linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1600');
background-size:cover;
background-attachment:fixed;
color:white;
}
header{
padding:25px;
text-align:center;
backdrop-filter:blur(10px);
background:rgba(0,0,0,.5);
border-bottom:2px solid #00ff88;
}
.logo{
font-size:48px;
font-weight:900;
color:#00ff88;
text-shadow:0 0 20px #00ff88;
}
.hero{
padding:60px 20px;
text-align:center;
}
.hero h1{
font-size:44px;
margin-bottom:15px;
}
.hero p{
color:#ccc;
font-size:18px;
}
.cards{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}
.card{
background:rgba(20,20,20,.85);
border:1px solid rgba(0,255,136,.25);
border-radius:25px;
padding:25px;
text-align:center;
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,255,136,.15);
transition:.3s;
}
.card:hover{
transform:translateY(-6px);
}
.site{
font-size:28px;
font-weight:bold;
color:#00ff88;
}
.bonus{
font-size:42px;
font-weight:900;
margin:20px 0;
}
.info{
color:#ccc;
margin-bottom:20px;
}
.btn{
display:block;
padding:15px;
background:#00ff88;
color:black;
font-weight:bold;
text-decoration:none;
border-radius:15px;
}
.telegram{
max-width:800px;
margin:40px auto;
padding:20px;
}
.telegram a{
display:block;
background:#229ED9;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:bold;
text-decoration:none;
color:white;
}
footer{
text-align:center;
padding:30px;
color:#999;
}
</style>
</head>
<body>
<header>
<div class="logo">RICHBONUS</div>
</header>
<section class="hero">
<h1>Güncel Deneme Bonusları</h1>
<p>En güncel bonus fırsatlarını keşfedin.</p>
</section>
<div class="cards">
<div class="card">
<div class="site">BETPARİ</div>
<div class="bonus">₺1.000</div>
<div class="info">Deneme Bonusu</div>
<a href="#" class="btn">HEMEN İNCELE</a>
</div>
<div class="card">
<div class="site">BAHİSBEY</div>
<div class="bonus">₺500</div>
<div class="info">Deneme Bonusu</div>
<a href="#" class="btn">HEMEN İNCELE</a>
</div>
<div class="card">
<div class="site">GOLEY90</div>
<div class="bonus">₺1.000</div>
<div class="info">Deneme Bonusu</div>
<a href="#" class="btn">HEMEN İNCELE</a>
</div>
<div class="card">
<div class="site">BETPLAY</div>
<div class="bonus">₺1.500</div>
<div class="info">Deneme Bonusu</div>
<a href="#" class="btn">HEMEN İNCELE</a>
</div>
</div>
<div class="telegram">
<a href="https://t.me/Richofficall">
📢 Telegram Kanalına Katıl
</a>
</div>
<footer>
© 2026 RichBonus
</footer>
</body>
</html>
