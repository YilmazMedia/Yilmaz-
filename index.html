<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Premium Bonus Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:#0d0d0d;
color:#fff;
}
header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}
.logo{
font-size:24px;
font-weight:bold;
color:#f5c542;
}
.btn{
padding:10px 20px;
border:none;
border-radius:8px;
background:#f5c542;
color:#000;
font-weight:bold;
cursor:pointer;
}
.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#111,#222);
}
.hero h1{
font-size:36px;
color:#f5c542;
}
.hero p{
margin-top:10px;
color:#ccc;
}
.cards{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}
.card{
background:#171717;
border:1px solid #333;
padding:20px;
border-radius:15px;
transition:.3s;
}
.card:hover{
transform:translateY(-5px);
border-color:#f5c542;
}
.card h3{
color:#f5c542;
margin-bottom:10px;
}
footer{
padding:20px;
text-align:center;
color:#888;
}
</style>
</head>
<body>
<header>
<div class="logo">BONUS PORTAL</div>
<button class="btn">Kayıt Ol</button>
</header>
<section class="hero">
<h1>Premium Kampanyalar</h1>
<p>En güncel fırsatlar ve özel promosyonlar</p>
</section>
<section class="cards">
<div class="card">
<h3>Hoş Geldin Paketi</h3>
<p>Yeni üyelere özel kampanya.</p>
</div>
<div class="card">
<h3>VIP Fırsatlar</h3>
<p>Özel avantajlar ve teklifler.</p>
</div>
<div class="card">
<h3>Günlük Bonuslar</h3>
<p>Her gün yenilenen promosyonlar.</p>
</div>
</section>
<footer>
© 2026 Premium Bonus Portal
</footer>
</body>
</html>
