<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BaronBonus</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#0f172a,#1e3a8a);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{width:100%;max-width:450px;background:rgba(255,255,255,.08);backdrop-filter:blur(15px);border-radius:25px;padding:30px;text-align:center}
.avatar{width:120px;height:120px;border-radius:50%;background:#fbbf24;margin:auto;display:flex;align-items:center;justify-content:center;font-size:45px;font-weight:bold;color:#000}
h1{color:#fff;margin-top:15px}
p{color:#cbd5e1;margin-top:8px;margin-bottom:25px}
.btn{display:block;width:100%;padding:18px;margin:12px 0;border:none;border-radius:15px;background:#2563eb;color:#fff;font-size:18px;font-weight:bold;text-decoration:none;cursor:pointer;transition:.3s}
.btn:hover{transform:scale(1.03)}
.footer{margin-top:20px;color:#94a3b8}
</style>
</head>
<body>
<div class="card">
<div class="avatar">B</div>
<h1>BaronBonus</h1>
<p>Tüm bağlantılar tek sayfada</p>

🌐 Web Sitesi

🎁 Kampanyalar
📱 Telegram
📸 Instagram
💬 WhatsApp
📞 İletişim

<div class="footer">
© 2026 BaronBonus
</div>
</div>
</body>
</html>
