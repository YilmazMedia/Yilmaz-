<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Oyun</title>
<style>
body{margin:0;background:#111;color:#fff;text-align:center;font-family:Arial}
#oyun{width:400px;height:500px;background:#222;margin:20px auto;position:relative;overflow:hidden;border-radius:15px}
#oyuncu{width:50px;height:50px;background:#00f;position:absolute;bottom:10px;left:175px;border-radius:10px}
.engel{width:50px;height:50px;background:red;position:absolute;top:-50px;border-radius:10px}
</style>
</head>
<body>
<h2>Kaçış Oyunu</h2>
<p>Skor: <span id="skor">0</span></p>
<div id="oyun">
<div id="oyuncu"></div>
</div>

<script>
const oyun=document.getElementById("oyun");
const oyuncu=document.getElementById("oyuncu");
let x=175,skor=0;

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft"&&x>0)x-=20;
if(e.key==="ArrowRight"&&x<350)x+=20;
oyuncu.style.left=x+"px";
});

function engelOlustur(){
let e=document.createElement("div");
e.className="engel";
e.style.left=Math.random()*350+"px";
oyun.appendChild(e);
let y=-50;
let hareket=setInterval(()=>{
y+=5;
e.style.top=y+"px";

if(y>500){
e.remove();
clearInterval(hareket);
skor++;
document.getElementById("skor").innerText=skor;
}

let ex=e.offsetLeft,ey=y;
if(ex<x+50&&ex+50>x&&ey>440){
alert("Oyun Bitti! Skor: "+skor);
location.reload();
}
},30);
}
setInterval(engelOlustur,1000);
</script>
</body>
</html>
