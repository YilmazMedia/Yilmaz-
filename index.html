<!DOCTYPE html>

<title>RichBonus</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080808;
color:#fff;
}

header{
background:#111;
padding:25px;
text-align:center;
border-bottom:3px solid #00ff88;
}

.logo{
font-size:42px;
font-weight:900;
color:#00ff88;
}

.hero{

}

.cards{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;

.card{
background:#151515;
border-radius:20px;

text-align:center;

.site{

font-weight:bold;
color:#00ff88;
}

.bonus{
font-size:40px;
font-weight:bold;
margin:20px 0;
}

.btn{
display:block;
padding:15px;
background:#00ff88;
color:#000;
text-decoration:none;
border-radius:12px;
font-weight:bold;
font-size:18px;
}

.telegram{
max-width:1200px;
margin:30px auto;
padding:20px;
}

.telegram a{
display:block;
background:#229ED9;
padding:18px;
text-align:center;
color:white;
text-decoration:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
}

footer{
padding:25px;
text-align:center;
color:#888;
}
</style>

</head>
