<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bonus Kampanyası</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:#fff;text-align:center}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;background:linear-gradient(135deg,#0f172a,#1e3a8a)}
.badge{background:#22c55e;padding:10px 20px;border-radius:30px;font-weight:bold}
h1{font-size:60px;margin:20px 0}
p{max-width:600px;color:#cbd5e1;font-size:18px}
.btn{display:inline-block;margin-top:25px;padding:15px 35px;background:#3b82f6;color:#fff;text-decoration:none;border-radius:10px;font-weight:bold}
.card{margin-top:40px;background:#1e293b;padding:25px;border-radius:15px;max-width:500px}
.timer{font-size:32px;font-weight:bold;color:#22c55e;margin-top:15px}
</style>
</head>
<body>
<section class="hero">
<div class="badge">ÖZEL KAMPANYA</div>
<h1>%100 Hoş Geldin Bonusu</h1>
<p>Yeni üyeler için sınırlı süreli özel kampanya. Fırsatı kaçırmadan hemen katılın.</p>
<a href="#" class="btn">Kampanyaya Katıl</a>
<div class="card">
<h2>Kampanya Detayları</h2>
<p>Belirlenen şartlar kapsamında bonus ve ödüllerden yararlanabilirsiniz.</p>
<div class="timer" id="sayac">23:59:59</div>
</div>
</section>
<script>
let s=86399;
setInterval(()=>{let h=Math.floor(s/3600),m=Math.floor((s%3600)/60),d=s%60;document.getElementById('sayac').innerHTML=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(d).padStart(2,'0')}`;if(s>0)s--;},1000);
</script>
</body>
</html>
