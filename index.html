<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seni Çok Seviyorum ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
background:linear-gradient(135deg,#ff4d6d,#ff85a2,#ffb3c1);
overflow:hidden;
height:100vh;
}

#loading{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4d6d,#ff85a2);
color:white;
z-index:9999;
}

#loading h1{
font-size:40px;
text-align:center;
animation:pulse 1s infinite;
}

#main{
display:none;
height:100vh;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:40px 30px;
border-radius:30px;
text-align:center;
color:white;
width:100%;
max-width:380px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.card h2{
font-size:38px;
margin-bottom:15px;
}

.card p{
font-size:20px;
line-height:1.8;
}

.heart{
position:fixed;
top:-20px;
color:white;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
from{
transform:translateY(-20px);
opacity:1;
}
to{
transform:translateY(110vh);
opacity:0;
}
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}
</style>
</head>
<body>

<div id="loading">
<h1>❤️ Kalbimin sahibi gelmiş❤️</h1>
</div>

<div id="main">
<div class="card">
<h2>❤️</h2>
<p>
Seni Çok Seviyorum ❤️<br><br>
İyi ki varsın...
Benim için çok özel ve çok güzelsin hayatımın anlamı güzel hatunum😍
</p>
</div>
</div>

<script>

setTimeout(() => {
document.getElementById("loading").style.display="none";
document.getElementById("main").style.display="flex";
},3000);

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";
heart.style.animationDuration=(Math.random()*4+3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);
}

setInterval(createHeart,250);

</script>

</body>
</html>
