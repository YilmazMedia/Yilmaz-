<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BP Game Portal</title><style>body{margin:0;background:#08111f;color:#fff;font-family:Arial;text-align:center}.top{padding:20px;background:#0d1b2f}.logo{font-size:32px;color:#00aaff;font-weight:bold}.btn{padding:12px 25px;margin:5px;border:none;border-radius:10px;background:#00aaff;color:#fff;cursor:pointer}.games{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:20px}.card{background:#10233d;padding:20px;border-radius:15px}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center}.box{background:#10233d;padding:20px;border-radius:15px;width:300px}.box input{width:100%;padding:10px;margin:5px 0}</style></head><body><div class="top"><div class="logo">BP GAME PORTAL</div><button class="btn" onclick="reg.style.display='flex'">Kayıt Ol</button><button class="btn" onclick="log.style.display='flex'">Giriş Yap</button></div><h1>Oyun Merkezi</h1><div class="games"><div class="card">🚗 Yarış Oyunu</div><div class="card">🧩 Bulmaca Oyunu</div><div class="card">🚀 Uzay Macerası</div><div class="card">🏹 Nişancı Oyunu</div></div><div class="modal" id="reg"><div class="box"><h2>Kayıt Ol</h2><input id="u1" placeholder="Kullanıcı"><input id="p1" type="password" placeholder="Şifre"><button class="btn" onclick="localStorage.u=u1.value;localStorage.p=p1.value;alert('Kayıt tamam');reg.style.display='none'">Kaydet</button></div></div><div class="modal" id="log"><div class="box"><h2>Giriş Yap</h2><input id="u2"><input id="p2" type="password"><button class="btn" onclick="u2.value==localStorage.u&&p2.value==localStorage.p?alert('Giriş başarılı'):alert('Hatalı bilgi')">Giriş</button></div></div></body></html>
