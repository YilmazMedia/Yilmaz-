
<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Betplay</title><style>body{margin:0;font-family:Arial;background:#07111f;color:#fff;text-align:center}nav{background:#0c1c31;padding:20px}.logo{font-size:32px;font-weight:bold;color:#00aaff}.hero{padding:80px 20px}.btn{padding:12px 24px;margin:8px;border:none;border-radius:10px;background:#00aaff;color:#fff;cursor:pointer}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center}.box{background:#10233d;padding:20px;border-radius:15px;width:320px}.box input{width:100%;padding:12px;margin:6px 0;border:none;border-radius:8px}.box button{width:100%;padding:12px;background:#00aaff;border:none;border-radius:8px;color:#fff}</style></head><body><nav><div class="logo">BP BETPLAY</div></nav><div class="hero"><h1>Betplay Portal</h1><p>Demo kullanıcı sistemi</p><button class="btn" onclick="document.getElementById('reg').style.display='flex'">Kayıt Ol</button><button class="btn" onclick="document.getElementById('log').style.display='flex'">Giriş Yap</button></div><div class="modal" id="reg"><div class="box"><h2>Kayıt Ol</h2><input id="ru" placeholder="Kullanıcı Adı"><input id="rp" type="password" placeholder="Şifre"><button onclick="localStorage.setItem('user',ru.value);localStorage.setItem('pass',rp.value);alert('Kayıt Oluşturuldu');reg.style.display='none'">Kaydol</button></div></div><div class="modal" id="log"><div class="box"><h2>Giriş Yap</h2><input id="lu" placeholder="Kullanıcı Adı"><input id="lp" type="password" placeholder="Şifre"><button onclick="lu.value===localStorage.getItem('user')&&lp.value===localStorage.getItem('pass')?alert('Giriş Başarılı'):alert('Hatalı Bilgiler')">Giriş</button></div></div><script>window.onclick=e=>{if(e.target.classList.contains('modal'))e.target.style.display='none'}</script></body></html>
