<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş Yap</title>
<style>
body{background:#07111f;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#10233d;padding:25px;border-radius:15px;width:320px}
input,button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px}
button{background:#00aaff;color:#fff;font-weight:bold}
</style>
</head>
<body>
<div class="box">
<h2>Giriş Yap</h2>
<input id="user" placeholder="Kullanıcı Adı">
<input id="pass" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>
</div>
<script>
function login(){
const u=localStorage.getItem("user");
const p=localStorage.getItem("pass");
if(document.getElementById("user").value===u &&
document.getElementById("pass").value===p){
alert("Giriş başarılı");
window.location="index.html";
}else{
alert("Hatalı bilgiler");
}
}
</script>
</body>
</html><!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayıt Ol</title>
<style>
body{background:#07111f;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#10233d;padding:25px;border-radius:15px;width:320px}
input,button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px}
button{background:#00aaff;color:#fff;font-weight:bold}
</style>
</head>
<body>
<div class="box">
<h2>Kayıt Ol</h2>
<input id="user" placeholder="Kullanıcı Adı">
<input id="pass" type="password" placeholder="Şifre">
<button onclick="register()">Kaydol</button>
</div>
<script>
function register(){
localStorage.setItem("user",document.getElementById("user").value);
localStorage.setItem("pass",document.getElementById("pass").value);
alert("Kayıt oluşturuldu");
window.location="login.html";
}
</script>
</body>
</html>
