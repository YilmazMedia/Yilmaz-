<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seni Seviyorum ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff4b6e,#ff7eb3,#7b61ff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:800px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:30px;
    padding:50px;
    text-align:center;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

h1{
    font-size:55px;
    margin-bottom:20px;
    text-shadow:0 0 15px rgba(255,255,255,0.5);
}

p{
    font-size:22px;
    line-height:1.8;
}

.heart{
    font-size:100px;
    animation:beat 1s infinite;
    margin-bottom:20px;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

.btn{
    margin-top:30px;
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4b6e;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.1);
}

#message{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
    color:#fff;
}

span{
    position:absolute;
    color:#fff;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-100px);
        opacity:1;
    }
    100%{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="heart">❤️</div>

    <h1>Seni Seviyorum</h1>

    <p>
        İyi ki varsın güzellim...<br>
        Hayatımın en güzel tesadüfü sensin.<br>
        Her günüm seninle daha anlamlı. ❤️
    </p>

    <button class="btn" onclick="showLove()">
        Mesajımı Oku 💌
    </button>

    <div id="message"></div>
</div>

<script>
function showLove(){
    document.getElementById("message").innerHTML =
    "Seni çok seviyorum ❤️ Sonsuza kadar yanımda ol.";
}

function createHeart(){
    const heart = document.createElement("span");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = Math.random()*30 + 15 + "px";
    heart.style.animationDuration = Math.random()*3 + 2 + "s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
